VAI TRÒ & YÊU CẦU DỰ ÁN:
Bạn là một Senior Frontend Developer giỏi nhất về Vanilla JavaScript, HTML5 và CSS3. Hãy xây dựng một Web App học tập có tên Sunlogic chỉ trong MỘT FILE index.html duy nhất (bao gồm cả <style> và <script>).

CÔNG NGHỆ BẮT BUỘC:

HTML5: Cấu trúc ngữ nghĩa rõ ràng.

CSS: Sử dụng Tailwind CSS qua thẻ <script src="https://cdn.tailwindcss.com"></script> kết hợp với CSS thuần trong thẻ <style> để viết các animation (keyframes) và Glassmorphism.

JavaScript thuần (Vanilla JS): Thao tác trực tiếp với DOM (document.getElementById, addEventListener). BẮT BUỘC dùng localStorage để lưu trữ dữ liệu (isLoggedIn, tổng thời gian, streak, danh sách task) để F5 không bị mất.

HỆ THỐNG THIẾT KẾ (UI/UX):

Bảng màu:

Nền: Trắng kem #FDFDFD.

Primary Gradient: Cam #FF512F sang Vàng #F09819 (Nút bấm, viền đếm ngược).

Accent: Xanh dương #4FACFE và Xanh lá #22C55E.

Glassmorphism: Các thẻ card dùng class: bg-white/60 backdrop-blur-lg border border-white/20 shadow-xl rounded-2xl.

CẤU TRÚC DOM & LOGIC (CHIA 2 PHẦN CHÍNH):

PHẦN 1: MÀN HÌNH KHÓA (<div id="login-view">)

Giao diện: Chia 2 cột. Trái: Chữ truyền cảm hứng ("Học thông minh hơn..."). Phải: Form đăng nhập.

Form: Input Email, Input Password, Nút "Vào không gian học tập", Nút "Tiếp tục với Google".

Logic JS: Hàm login(). Lấy giá trị email/pass. Nếu length > 0, set localStorage.setItem('isLoggedIn', 'true'), ẩn #login-view (display: none) và hiện #app-view (display: block). Cập nhật tên user lên Header.

PHẦN 2: KHÔNG GIAN HỌC TẬP (<div id="app-view" style="display: none;">)
Render giao diện dạng Dashboard với các module:

1. Header & Gamification:

Hiển thị Avatar, Text: "Tổng thời gian: <span id="total-time">0</span> phút", "Streak: 🔥 <span id="streak-count">0</span>".

5 Trái tim: 5 icon ❤️.

Logic JS: Hàm loadData(). Khi vào app, lấy data từ localStorage. Nếu ngày truy cập cuối cùng khác hôm nay VÀ totalMinutes hôm nay = 0 -> Đổi 1 tim thành 🤍 (màu xám). Nếu tim = 0, reset streak = 0.

2. Đồng hồ Pomodoro:

Giao diện: Khối tròn lớn ở giữa. Chữ số đếm ngược 25:00. Có 3 nút: Play, Pause, Reset.

Logic JS: Dùng setInterval. Biến timeLeft = 1500. Cập nhật số lên màn hình innerHTML. Khi về 00:00, gọi hàm clearInterval, phát âm thanh Audio() tiếng Ting (dùng link mp3 online có sẵn), cộng 25 vào totalTime, cộng 1 vào streak lưu xuống localStorage và cập nhật DOM ngay lập tức.

3. Checklist & Lập lịch:

Giao diện: Input text, nút "Thêm". Danh sách ul/li bên dưới. Nút "Tạo lịch mẫu".

Logic JS: Bấm Thêm -> document.createElement('li'), nhét checkbox vào. Khi click checkbox -> Thêm class gạch ngang chữ (line-through).

Bấm "Tạo lịch mẫu" -> Tự động sinh ra 3 thẻ li chứa text: "Ngày 1: Lý thuyết", "Ngày 2: Luyện đề Toán", "Ngày 3: Rà soát lỗi".

4. Trợ giảng AI (Widget góc phải dưới):

Giao diện: Khung chat nhỏ chứa input và nút Gửi.

Logic JS: Khi bấm gửi, tạo thẻ div chứa tin nhắn User. Sau đó dùng setTimeout 1 giây để tạo thẻ div chứa tin nhắn AI phản hồi tự động (Hardcode văn bản: "Chào bạn! Thay vì dùng công thức ∫ u dv dài dòng, bạn đã thử dùng phương pháp Kẻ bảng (Múa cột) cho bài Tích phân này chưa? Cột 1 đặt u là đa thức, cột 2 đặt dv là lượng giác/mũ nhé!").

5. Cộng đồng:

Tab Phòng tự học: Text "Có 1,204 người đang học". Nút "Cổ vũ".

Logic CSS/JS: Khi bấm nút "Cổ vũ", dùng JS tạo ra các phần tử <div class="flying-emoji">❤️</div> gắn vào body. Dùng CSS @keyframes cho nó bay từ dưới lên trên và mờ dần, sau 2s thì xóa thẻ DOM đó đi.

Tab Q&A: Render tĩnh một bài viết "Mẹo nhớ Oxyz".

YÊU CẦU ĐẦU RA (OUTPUT STRICT FORMAT):
Trả về DUY NHẤT một block code HTML chứa toàn bộ nội dung. Không cắt bớt code. Thẻ <style> đặt trên head, thẻ <script> đặt ở cuối thẻ <body>. Code phải sạch, chạy được ngay lập tức khi lưu thành file index.html và mở trên trình duyệt.
